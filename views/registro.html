<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Control de Acceso IBM</title>
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <div class="layout-grid">
      <div class="image-container register-bg">
        <video autoplay muted loop playsinline class="video-background">
          <source src="./video/REGISTRO (1).mp4" type="video/mp4" />
          Tu navegador no soporta videos.
        </video>
      </div>
      <div class="form-container">
        <div class="form-wrapper">
          <h2>Crear Cuenta IBM</h2>
          <p>Complete el formulario para registrarse.</p>
          <form id="registerForm" novalidate>
            <div class="input-group">
              <label for="name">Nombre Completo</label>
              <input type="text" id="name" required placeholder="Juan Pérez" />
              <div class="error-message" id="nameError"></div>
            </div>
            <div class="input-group">
              <label for="email">Correo Electrónico</label>
              <input
                type="email"
                id="email"
                required
                placeholder="usuario@ibm.com"
              />
              <div class="error-message" id="emailError"></div>
            </div>
            <div class="input-group">
              <label for="password">Contraseña</label>
              <input
                type="password"
                id="password"
                required
                placeholder="••••••••"
              />
              <div class="error-message" id="passwordError"></div>
            </div>
            <div class="input-group">
              <label for="confirmPassword">Confirmar Contraseña</label>
              <input
                type="password"
                id="confirmPassword"
                required
                placeholder="••••••••"
              />
              <div class="error-message" id="confirmError"></div>
            </div>
            <button type="submit" class="btn-primary" id="registerBtn" disabled>
              Registrarse
            </button>
          </form>
          <div class="auth-links">
            <p>¿Ya tienes cuenta? <a href="index.html">Inicia sesión</a></p>
          </div>
        </div>
      </div>
    </div>
    <div id="toastContainer" class="toast-container"></div>
    <script src="./js/auth.js"></script>
  </body>
</html>
